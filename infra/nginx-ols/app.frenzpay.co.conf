# OpenLiteSpeed virtual host config for app.frenzpay.co
# Reverse-proxies to Next.js on port 3000
#
# In CyberPanel: Site → Rewrite Rules → add the rewrite block below.
# Or place this in the vhost conf directory and include it.

# ── Rewrite rules (HTTP → HTTPS handled by Let's Encrypt) ────────────────────
rewrite {
  enable            1
  autoLoadHtaccess  0
  rules             <<<END_RULES
  RewriteEngine On

  # Exclude /.well-known (ACME challenges, security.txt)
  RewriteRule ^/.well-known/ - [L]

  # Health check endpoint — no proxy needed
  RewriteRule ^/healthz$ - [L]

  # Proxy everything to Node.js
  RewriteRule ^(.*)$ http://127.0.0.1:3000$1 [P,L]
  END_RULES
}

# ── Proxy pass ────────────────────────────────────────────────────────────────
extprocessor nextjs_web {
  type          proxy
  address       http://127.0.0.1:3000
  maxConns      100
  pcKeepAliveTimeout  30
  initTimeout   30
  retryTimeout  0
  respBuffer    0
}

# ── Context for proxied requests ─────────────────────────────────────────────
context / {
  type            proxy
  handler         nextjs_web
  addDefaultCharset   off

  # Pass real client IP to Node
  extraHeaders    <<<EXTRA
  X-Forwarded-For: $REMOTE_ADDR
  X-Forwarded-Proto: $HTTP_PROTO
  X-Real-IP: $REMOTE_ADDR
  EXTRA
}

# ── Security headers ──────────────────────────────────────────────────────────
# These are also set by Next.js middleware but belt-and-suspenders approach
# is better for a fintech.
#
# In CyberPanel Site → SSL → enable HSTS (max-age=63072000; includeSubDomains; preload)
